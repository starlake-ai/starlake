version: 1
env:
  # ── Global ─────────────────────────────────────────────────────────────
  root_path: "{{SL_ROOT}}"
  SL_ENV: LOCAL

  # ── Slack ──────────────────────────────────────────────────────────────
  SLACK_BOT_TOKEN: "{{SLACK_BOT_TOKEN}}"       # xoxb-... Bot User OAuth Token

  # ── Jira ───────────────────────────────────────────────────────────────
  JIRA_DOMAIN: "{{JIRA_DOMAIN}}"               # yourcompany (for yourcompany.atlassian.net)
  JIRA_EMAIL: "{{JIRA_EMAIL}}"
  JIRA_API_TOKEN: "{{JIRA_API_TOKEN}}"

  # ── Twitter / X ────────────────────────────────────────────────────────
  TWITTER_BEARER_TOKEN: "{{TWITTER_BEARER_TOKEN}}"
  TWITTER_SEARCH_QUERY: "{{TWITTER_SEARCH_QUERY | default('starlake')}}"
  TWITTER_USERNAME: "{{TWITTER_USERNAME | default('starlakeai')}}"
  TWITTER_USER_ID: "{{TWITTER_USER_ID}}"

  # ── Salesforce ─────────────────────────────────────────────────────────
  SF_INSTANCE: "{{SF_INSTANCE}}"               # yourorg (for yourorg.salesforce.com)
  SF_CLIENT_ID: "{{SF_CLIENT_ID}}"
  SF_CLIENT_SECRET: "{{SF_CLIENT_SECRET}}"

  # ── HubSpot ────────────────────────────────────────────────────────────
  HUBSPOT_ACCESS_TOKEN: "{{HUBSPOT_ACCESS_TOKEN}}"

  # ── Stripe ─────────────────────────────────────────────────────────────
  STRIPE_SECRET_KEY: "{{STRIPE_SECRET_KEY}}"   # sk_live_... or sk_test_...

  # ── GitHub ─────────────────────────────────────────────────────────────
  GITHUB_TOKEN: "{{GITHUB_TOKEN}}"             # ghp_... Personal Access Token
  GITHUB_ORG: "{{GITHUB_ORG | default('starlake-ai')}}"